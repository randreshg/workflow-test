[project]
name = "workflow-test"
description = "Agentic workflow orchestration with acpx flows"

[tools]
node = { command = "node", version = ">=22" }
npm = { command = "npm" }
acpx = { command = "acpx" }
codex = { command = "codex" }
claude = { command = "claude" }
gh = { command = "gh", optional = true }

[commands]
generate = { run = "dekk agents generate", description = "Generate agent configs from .agents/ source of truth" }
install = { run = "dekk agents install", description = "Install skills to ~/.codex/skills/" }
status = { run = "dekk agents status", description = "Show agent config sync state" }
